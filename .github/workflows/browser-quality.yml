name: Browser Quality

on:
  pull_request:
    paths:
      - 'index.html'
      - 'v2-*.css'
      - 'src/v2/**'
      - 'tests/e2e/**'
      - 'playwright.config.mjs'
      - 'package.json'
      - '.github/workflows/browser-quality.yml'
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: browser-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Install browser-test packages without changing the lockfile
        run: npm install --no-save --no-package-lock @playwright/test@1.55.0 @axe-core/playwright@4.10.2
      - run: npx playwright install --with-deps chromium
      - name: Run browser, accessibility, and visual gates
        run: npx playwright test

      - name: Promote approved visual captures to baselines
        if: success() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        shell: bash
        run: |
          set -euo pipefail
          snapshot_dir='tests/e2e/snapshots'
          refresh_marker="${snapshot_dir}/.refresh"
          legacy_refresh_marker="${snapshot_dir}/.refresh-css-scale"
          if [ -f "${snapshot_dir}/.ready" ] && [ ! -f "$refresh_marker" ] && [ ! -f "$legacy_refresh_marker" ]; then
            echo 'Visual baselines are already active; comparison mode completed.'
            exit 0
          fi

          capture_dir='test-results/visual-capture'
          expected=(
            chromium-home.png
            chromium-discover.png
            chromium-profile.png
            chromium-now.png
            chromium-match.png
            mobile-chromium-home.png
            mobile-chromium-discover.png
            mobile-chromium-profile.png
            mobile-chromium-now.png
            mobile-chromium-match.png
          )
          for image in "${expected[@]}"; do
            test -s "${capture_dir}/${image}"
          done

          release_label="$(jq -r '.uiRelease // .contentRelease // .stabilityRelease // .release' build-info.json)"
          mkdir -p "$snapshot_dir"
          cp "${capture_dir}"/*.png "$snapshot_dir"/
          printf '%s visual baselines approved by Browser Quality\n' "${release_label^^}" > "${snapshot_dir}/.ready"
          rm -f "$refresh_marker" "$legacy_refresh_marker"

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add "$snapshot_dir"
          if git diff --cached --quiet; then
            echo 'No baseline changes to commit.'
            exit 0
          fi
          git commit -m "test: refresh ${release_label^^} visual baselines"
          git push origin "HEAD:${GITHUB_HEAD_REF}"

      - name: Upload Playwright report and visual captures
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: browser-quality-${{ github.run_id }}
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 14
