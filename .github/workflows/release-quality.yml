name: Release Quality

on:
  pull_request:
    paths:
      - 'index.html'
      - 'build-info.json'
      - 'v2-*.css'
      - 'legal.css'
      - 'src/v2/**'
      - 'assets/audio/**'
      - 'about/**'
      - 'privacy/**'
      - 'audio-credits/**'
      - 'docs/legal/**'
      - 'docs/operations/ADS_MONETIZATION_READINESS.md'
      - 'scripts/verify-release.mjs'
      - '.github/workflows/release-quality.yml'
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  artifact:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
      - name: Verify CR1 Pages artifact
        run: node scripts/verify-release.mjs --root _site
      - uses: actions/upload-artifact@v4
        with:
          name: release-quality-${{ github.run_id }}
          path: |
            _site/build-info.json
            _site/assets/audio/rights-manifest.json
          retention-days: 14

  public-smoke:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: artifact
    timeout-minutes: 9
    steps:
      - uses: actions/checkout@v4
      - name: Poll the public origin for CR1
        id: smoke
        shell: bash
        run: |
          set -uo pipefail
          verified=false
          home_ok=false; build_ok=false; entry_ok=false; style_ok=false; audio_ok=false; legal_ok=false; ads_ok=false; continuity_ok=false
          for attempt in $(seq 1 24); do
            bust="cr1=${GITHUB_SHA}-$(date +%s)"
            home="$(curl -fsSL --max-time 25 -H 'Cache-Control: no-cache' "https://my-music-vibe.com/?${bust}" 2>/dev/null || true)"
            build="$(curl -fsSL --max-time 25 -H 'Cache-Control: no-cache' "https://my-music-vibe.com/build-info.json?${bust}" 2>/dev/null || true)"
            entry="$(curl -fsSL --max-time 25 -H 'Cache-Control: no-cache' "https://my-music-vibe.com/src/v2/main.mjs?${bust}" 2>/dev/null || true)"
            app="$(curl -fsSL --max-time 25 -H 'Cache-Control: no-cache' "https://my-music-vibe.com/src/v2/ui/app.mjs?${bust}" 2>/dev/null || true)"
            style="$(curl -fsSL --max-time 25 -H 'Cache-Control: no-cache' "https://my-music-vibe.com/v2-app.css?${bust}" 2>/dev/null || true)"
            commercial_css="$(curl -fsSL --max-time 25 -H 'Cache-Control: no-cache' "https://my-music-vibe.com/v2-commercial-readiness.css?${bust}" 2>/dev/null || true)"
            audio_source="$(curl -fsSL --max-time 25 -H 'Cache-Control: no-cache' "https://my-music-vibe.com/src/v2/audio/original-clips.mjs?${bust}" 2>/dev/null || true)"
            audio_actions="$(curl -fsSL --max-time 25 -H 'Cache-Control: no-cache' "https://my-music-vibe.com/src/v2/ui/commercial-audio-actions.mjs?${bust}" 2>/dev/null || true)"
            questions="$(curl -fsSL --max-time 25 -H 'Cache-Control: no-cache' "https://my-music-vibe.com/src/v2/data/questions.mjs?${bust}" 2>/dev/null || true)"
            manifest="$(curl -fsSL --max-time 25 -H 'Cache-Control: no-cache' "https://my-music-vibe.com/assets/audio/rights-manifest.json?${bust}" 2>/dev/null || true)"
            ad_policy="$(curl -fsSL --max-time 25 -H 'Cache-Control: no-cache' "https://my-music-vibe.com/src/v2/ads/policy.mjs?${bust}" 2>/dev/null || true)"
            about="$(curl -fsSL --max-time 25 -H 'Cache-Control: no-cache' "https://my-music-vibe.com/about/?${bust}" 2>/dev/null || true)"
            privacy="$(curl -fsSL --max-time 25 -H 'Cache-Control: no-cache' "https://my-music-vibe.com/privacy/?${bust}" 2>/dev/null || true)"
            credits="$(curl -fsSL --max-time 25 -H 'Cache-Control: no-cache' "https://my-music-vibe.com/audio-credits/?${bust}" 2>/dev/null || true)"
            weekly="$(curl -fsSL --max-time 25 -H 'Cache-Control: no-cache' "https://my-music-vibe.com/src/v2/domain/weekly.mjs?${bust}" 2>/dev/null || true)"
            result="$(curl -fsSL --max-time 25 -H 'Cache-Control: no-cache' "https://my-music-vibe.com/ko/results/enfp/?${bust}" 2>/dev/null || true)"
            legacy_audio_code="$(curl -sS -o /dev/null -w '%{http_code}' --max-time 20 "https://my-music-vibe.com/assets/audio/Tech_Talk.mp3?${bust}" || true)"

            home_ok=false; build_ok=false; entry_ok=false; style_ok=false; audio_ok=false; legal_ok=false; ads_ok=false; continuity_ok=false
            grep -q 'Commercial Readiness CR1' <<<"$home" && grep -q 'data-ads-enabled="false"' <<<"$home" && home_ok=true
            jq -e '.commercialReadinessRelease == "cr1" and .adsEnabled == false and .runtimeOverrides == false and .entry == "/src/v2/main.mjs?commercial=cr1"' <<<"$build" >/dev/null 2>&1 && build_ok=true
            grep -q 'app.mjs?commercial=cr1' <<<"$entry" && grep -q 'commercialReadinessRelease' <<<"$entry" && grep -q 'commercialAudioMethods' <<<"$app" && entry_ok=true
            grep -q 'v2-commercial-readiness.css' <<<"$style" && grep -q 'commercial-readiness' <<<"$style" && grep -q 'data-ads-enabled="false"' <<<"$commercial_css" && style_ok=true
            grep -q 'createOriginalAudioUrl' <<<"$audio_source" && grep -q 'samplesUsed: false' <<<"$audio_source" && grep -q 'isCommercialAudioClip' <<<"$audio_actions" && grep -q 'audioClipId' <<<"$questions" && ! grep -q '\.mp3' <<<"$questions" && jq -e '.release == "cr1" and .thirdPartySamplesUsed == false and (.clips | length) == 8' <<<"$manifest" >/dev/null 2>&1 && [ "$legacy_audio_code" != '200' ] && audio_ok=true
            grep -q 'data-commercial-readiness-release="cr1"' <<<"$about" && grep -q 'data-commercial-readiness-release="cr1"' <<<"$privacy" && grep -q 'data-commercial-readiness-release="cr1"' <<<"$credits" && grep -q '현재 광고 비활성' <<<"$privacy" && grep -q '직접 합성' <<<"$credits" && legal_ok=true
            grep -q 'ADS_ENABLED = false' <<<"$ad_policy" && grep -q "AD_PUBLISHER_ID = ''" <<<"$ad_policy" && ! grep -Eqi 'googlesyndication|adsbygoogle|doubleclick' <<<"$home" && ads_ok=true
            grep -q 'buildWeeklyVibe' <<<"$weekly" && grep -q 'data-page-type="static_result"' <<<"$result" && continuity_ok=true
            if [ "$home_ok" = true ] && [ "$build_ok" = true ] && [ "$entry_ok" = true ] && [ "$style_ok" = true ] && [ "$audio_ok" = true ] && [ "$legal_ok" = true ] && [ "$ads_ok" = true ] && [ "$continuity_ok" = true ]; then verified=true; break; fi
            sleep 10
          done
          for key in verified home_ok build_ok entry_ok style_ok audio_ok legal_ok ads_ok continuity_ok; do eval "value=\$$key"; echo "$key=$value" >> "$GITHUB_OUTPUT"; done
          [ "$verified" = true ]

      - name: Report and close CR1 issue
        if: always()
        uses: actions/github-script@v7
        env:
          VERIFIED: ${{ steps.smoke.outputs.verified }}
          HOME_OK: ${{ steps.smoke.outputs.home_ok }}
          BUILD_OK: ${{ steps.smoke.outputs.build_ok }}
          ENTRY_OK: ${{ steps.smoke.outputs.entry_ok }}
          STYLE_OK: ${{ steps.smoke.outputs.style_ok }}
          AUDIO_OK: ${{ steps.smoke.outputs.audio_ok }}
          LEGAL_OK: ${{ steps.smoke.outputs.legal_ok }}
          ADS_OK: ${{ steps.smoke.outputs.ads_ok }}
          CONTINUITY_OK: ${{ steps.smoke.outputs.continuity_ok }}
        with:
          script: |
            const ok = process.env.VERIFIED === 'true';
            const body = `## CR1 public smoke\n\n- commit: \`${context.sha}\`\n- overall: **${ok ? 'PASS' : 'FAIL'}**\n- home CR1 + ads off: \`${process.env.HOME_OK}\`\n- build-info: \`${process.env.BUILD_OK}\`\n- canonical entry: \`${process.env.ENTRY_OK}\`\n- CSS entry: \`${process.env.STYLE_OK}\`\n- original audio + manifest + retired MP3: \`${process.env.AUDIO_OK}\`\n- public legal pages: \`${process.env.LEGAL_OK}\`\n- advertising disabled policy: \`${process.env.ADS_OK}\`\n- existing product continuity: \`${process.env.CONTINUITY_OK}\``;
            await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: 28, body });
            if (ok) {
              const { data: issue } = await github.rest.issues.get({ owner: context.repo.owner, repo: context.repo.repo, issue_number: 28 });
              await github.rest.issues.update({ owner: context.repo.owner, repo: context.repo.repo, issue_number: 28, body: (issue.body || '').replaceAll('- [ ]', '- [x]'), state: 'closed', state_reason: 'completed' });
            }
