name: Catalog Link Audit

on:
  schedule:
    - cron: '17 3 * * 1'
  workflow_dispatch:
  pull_request:
    paths:
      - 'src/v2/data/tracks.mjs'
      - 'src/v2/data/editorial-tracks.mjs'
      - 'src/v2/data/link-audit.mjs'
      - 'src/v2/domain/recommendation.mjs'
      - 'scripts/audit-links.mjs'
      - '.github/workflows/catalog-audit.yml'

permissions:
  contents: read
  issues: write

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Audit catalog link shape and current response
        id: audit
        continue-on-error: true
        run: node scripts/audit-links.mjs --online --output artifacts/catalog-link-audit.json
      - uses: actions/upload-artifact@v4
        with:
          name: catalog-link-audit-${{ github.run_id }}
          path: artifacts/catalog-link-audit.json
          retention-days: 30
      - name: Report broken exact links
        if: always() && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('artifacts/catalog-link-audit.json', 'utf8'));
            const broken = report.rows.filter((row) => row.validationError || [404, 410].includes(row.network?.status));
            if (!broken.length) return;
            const lines = broken.slice(0, 30).map((row) => `- \`${row.trackId}\` · ${row.platform} · ${row.validationError || row.network.status} · ${row.url}`);
            const title = `CAT1: ${broken.length} catalog links need review`;
            const body = `## Weekly catalog audit\n\n- generated: \`${report.generatedAt}\`\n- exact: \`${report.coverage.exact}/${report.coverage.total}\`\n- invalid/dead: \`${broken.length}\`\n\n${lines.join('\n')}\n\nFull JSON is attached to workflow run ${context.runId}. Search fallbacks remain available while these links are reviewed.`;
            const { data: issues } = await github.rest.issues.listForRepo({ owner: context.repo.owner, repo: context.repo.repo, state: 'open', labels: 'catalog-audit', per_page: 50 });
            const existing = issues.find((issue) => issue.title.startsWith('CAT1:'));
            if (existing) await github.rest.issues.update({ owner: context.repo.owner, repo: context.repo.repo, issue_number: existing.number, title, body });
            else await github.rest.issues.create({ owner: context.repo.owner, repo: context.repo.repo, title, body, labels: ['catalog-audit'] });
      - name: Fail pull requests on malformed or dead links
        if: github.event_name == 'pull_request'
        run: node scripts/audit-links.mjs --output artifacts/catalog-link-audit-static.json
