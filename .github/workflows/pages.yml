name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  pull_request:
    paths:
      - '**.html'
      - '**.md'
      - '**.yml'
      - '**.yaml'
      - '**.js'
      - '**.json'
      - '**.css'
      - 'assets/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  issues: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Verify generated site
        run: |
          test -f _site/index.html
          test -f _site/p2-analytics.js
          test -f _site/ko/results/enfp/index.html
          grep -q 'p2-analytics.js' _site/index.html
          grep -q 'static_result_view' _site/p2-static.js

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    if: github.event_name == 'push'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 15
    steps:
      - name: Inspect and prefer workflow publishing
        id: pages_source
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -uo pipefail

          before="$(gh api "repos/${GITHUB_REPOSITORY}/pages" 2>&1 || true)"
          before_summary="$(jq -c '{status,cname,html_url,build_type,source,https_enforced,protected_domain_state,pending_domain_unverified_at}' <<<"$before" 2>/dev/null || printf '%s' "$before")"
          build_type="$(jq -r '.build_type // "unknown"' <<<"$before" 2>/dev/null || echo unknown)"
          switch_status="not_needed"
          switch_output=""

          if [ "$build_type" != "workflow" ]; then
            set +e
            switch_output="$(gh api --method PUT "repos/${GITHUB_REPOSITORY}/pages" -f build_type=workflow 2>&1)"
            switch_code=$?
            set -e
            if [ "$switch_code" -eq 0 ]; then
              switch_status="success"
            else
              switch_status="failed_${switch_code}"
            fi
          fi

          after="$(gh api "repos/${GITHUB_REPOSITORY}/pages" 2>&1 || true)"
          after_summary="$(jq -c '{status,cname,html_url,build_type,source,https_enforced,protected_domain_state,pending_domain_unverified_at}' <<<"$after" 2>/dev/null || printf '%s' "$after")"

          {
            echo "before<<EOF"
            echo "$before_summary"
            echo "EOF"
            echo "after<<EOF"
            echo "$after_summary"
            echo "EOF"
            echo "switch_status=$switch_status"
            echo "switch_output<<EOF"
            echo "$switch_output"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Verify the public custom domain
        id: verify
        if: steps.deployment.outcome == 'success'
        env:
          DEPLOY_SHA: ${{ github.sha }}
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -uo pipefail

          verify_public_site() {
            local home result analytics
            home="$(curl -fsSL --retry 2 --retry-delay 2 -H 'Cache-Control: no-cache' "https://my-music-vibe.com/?deployment=${DEPLOY_SHA}" 2>/dev/null || true)"
            result="$(curl -fsSL --retry 2 --retry-delay 2 -H 'Cache-Control: no-cache' "https://my-music-vibe.com/ko/results/enfp/?deployment=${DEPLOY_SHA}" 2>/dev/null || true)"
            analytics="$(curl -fsSL --retry 2 --retry-delay 2 -H 'Cache-Control: no-cache' "https://my-music-vibe.com/p2-analytics.js?deployment=${DEPLOY_SHA}" 2>/dev/null || true)"

            grep -q 'p2-analytics.js' <<<"$home" \
              && grep -q 'data-page-type="static_result"' <<<"$result" \
              && grep -q 'music-vibe-visitor-v1' <<<"$analytics"
          }

          for attempt in $(seq 1 12); do
            if verify_public_site; then
              echo "verified=true" >> "$GITHUB_OUTPUT"
              echo "verification_path=workflow_deployment" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Workflow deployment not visible yet (attempt ${attempt}/12)."
            sleep 10
          done

          # A repository that is still configured for legacy branch publishing can
          # accept the Actions deployment but continue serving the old branch build.
          # Request one fresh legacy build as a safe fallback, then verify again.
          set +e
          legacy_output="$(gh api --method POST "repos/${GITHUB_REPOSITORY}/pages/builds" 2>&1)"
          legacy_code=$?
          set -e
          echo "legacy_build_code=$legacy_code" >> "$GITHUB_OUTPUT"
          {
            echo "legacy_build_output<<EOF"
            echo "$legacy_output"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          for attempt in $(seq 1 18); do
            if verify_public_site; then
              echo "verified=true" >> "$GITHUB_OUTPUT"
              echo "verification_path=legacy_build_fallback" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Fallback build not visible yet (attempt ${attempt}/18)."
            sleep 10
          done

          echo "verified=false" >> "$GITHUB_OUTPUT"
          echo "verification_path=failed" >> "$GITHUB_OUTPUT"
          echo "The custom domain did not serve the expected P2 assets." >&2
          exit 1

      - name: Collect Pages, DNS, and live-response diagnostics
        id: diagnostics
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -uo pipefail

          pages="$(gh api "repos/${GITHUB_REPOSITORY}/pages" 2>&1 || true)"
          pages_summary="$(jq -c '{status,cname,html_url,build_type,source,https_enforced,protected_domain_state,pending_domain_unverified_at}' <<<"$pages" 2>/dev/null || printf '%s' "$pages")"
          dns_a="$(dig +short A my-music-vibe.com | paste -sd ',' -)"
          dns_aaaa="$(dig +short AAAA my-music-vibe.com | paste -sd ',' -)"
          dns_cname="$(dig +short CNAME my-music-vibe.com | paste -sd ',' -)"
          dns_ns="$(dig +short NS my-music-vibe.com | paste -sd ',' -)"
          headers="$(curl -sSIL --max-time 20 https://my-music-vibe.com/ 2>&1 | grep -Ei '^(HTTP/|server:|location:|etag:|cache-control:|x-github-request:|x-served-by:|via:)' | tail -20 || true)"
          home_marker="$(curl -fsSL --max-time 20 -H 'Cache-Control: no-cache' "https://my-music-vibe.com/?diag=${GITHUB_SHA}" 2>/dev/null | grep -Eo 'p2-analytics\.js|Version Check:[^<]+' | head -5 | paste -sd ',' - || true)"
          analytics_marker="$(curl -fsSL --max-time 20 -H 'Cache-Control: no-cache' "https://my-music-vibe.com/p2-analytics.js?diag=${GITHUB_SHA}" 2>/dev/null | grep -Eo 'music-vibe-visitor-v1|P2 consent-aware analytics' | head -5 | paste -sd ',' - || true)"

          {
            echo "pages<<EOF"
            echo "$pages_summary"
            echo "EOF"
            echo "dns_a=$dns_a"
            echo "dns_aaaa=$dns_aaaa"
            echo "dns_cname=$dns_cname"
            echo "dns_ns=$dns_ns"
            echo "headers<<EOF"
            echo "$headers"
            echo "EOF"
            echo "home_marker=$home_marker"
            echo "analytics_marker=$analytics_marker"
          } >> "$GITHUB_OUTPUT"

      - name: Report deployment status to P2 issue
        if: always()
        uses: actions/github-script@v7
        env:
          DEPLOY_OUTCOME: ${{ steps.deployment.outcome }}
          VERIFY_OUTCOME: ${{ steps.verify.outcome }}
          VERIFY_PATH: ${{ steps.verify.outputs.verification_path }}
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
          COMMIT_SHA: ${{ github.sha }}
          SOURCE_BEFORE: ${{ steps.pages_source.outputs.before }}
          SOURCE_AFTER: ${{ steps.pages_source.outputs.after }}
          SOURCE_SWITCH: ${{ steps.pages_source.outputs.switch_status }}
          SOURCE_SWITCH_OUTPUT: ${{ steps.pages_source.outputs.switch_output }}
          LEGACY_BUILD_CODE: ${{ steps.verify.outputs.legacy_build_code }}
          LEGACY_BUILD_OUTPUT: ${{ steps.verify.outputs.legacy_build_output }}
          PAGES_DIAGNOSTICS: ${{ steps.diagnostics.outputs.pages }}
          DNS_A: ${{ steps.diagnostics.outputs.dns_a }}
          DNS_AAAA: ${{ steps.diagnostics.outputs.dns_aaaa }}
          DNS_CNAME: ${{ steps.diagnostics.outputs.dns_cname }}
          DNS_NS: ${{ steps.diagnostics.outputs.dns_ns }}
          LIVE_HEADERS: ${{ steps.diagnostics.outputs.headers }}
          HOME_MARKER: ${{ steps.diagnostics.outputs.home_marker }}
          ANALYTICS_MARKER: ${{ steps.diagnostics.outputs.analytics_marker }}
        with:
          script: |
            const issueNumber = 3;
            const marker = '<!-- pages-deploy-report -->';
            const success = process.env.DEPLOY_OUTCOME === 'success' && process.env.VERIFY_OUTCOME === 'success';
            const status = success ? '✅ 성공' : '❌ 실패';
            const clean = (value, fallback = '(없음)') => value?.trim() || fallback;
            const body = `${marker}
            ## GitHub Pages 배포 검증

            - 상태: **${status}**
            - 커밋: \`${process.env.COMMIT_SHA}\`
            - Pages URL: ${clean(process.env.PAGE_URL)}
            - Deploy 단계: \`${clean(process.env.DEPLOY_OUTCOME)}\`
            - 공개 도메인 검증: \`${clean(process.env.VERIFY_OUTCOME)}\`
            - 검증 경로: \`${clean(process.env.VERIFY_PATH)}\`
            - Pages 소스 전환: \`${clean(process.env.SOURCE_SWITCH)}\`
            - 레거시 빌드 요청 코드: \`${clean(process.env.LEGACY_BUILD_CODE)}\`

            <details><summary>Pages 설정·DNS·응답 진단</summary>

            **전환 전 Pages 설정**
            \`\`\`json
            ${clean(process.env.SOURCE_BEFORE)}
            \`\`\`

            **전환 후/최종 Pages 설정**
            \`\`\`json
            ${clean(process.env.SOURCE_AFTER)}
            ${clean(process.env.PAGES_DIAGNOSTICS, '')}
            \`\`\`

            **DNS**
            - A: \`${clean(process.env.DNS_A)}\`
            - AAAA: \`${clean(process.env.DNS_AAAA)}\`
            - CNAME: \`${clean(process.env.DNS_CNAME)}\`
            - NS: \`${clean(process.env.DNS_NS)}\`

            **공개 응답 마커**
            - 홈: \`${clean(process.env.HOME_MARKER)}\`
            - 분석 파일: \`${clean(process.env.ANALYTICS_MARKER)}\`

            **응답 헤더**
            \`\`\`
            ${clean(process.env.LIVE_HEADERS)}
            \`\`\`

            **소스 전환 응답**
            \`\`\`
            ${clean(process.env.SOURCE_SWITCH_OUTPUT)}
            \`\`\`

            **레거시 빌드 응답**
            \`\`\`
            ${clean(process.env.LEGACY_BUILD_OUTPUT)}
            \`\`\`
            </details>

            ${success
              ? '`my-music-vibe.com`에서 P2 홈, 정적 ENFP 결과 페이지, 분석 스크립트를 모두 확인했습니다.'
              : '배포 또는 공개 도메인 검증이 실패했으므로 진단 결과를 기준으로 이슈를 열어 둡니다.'}`.replace(/^ {12}/gm, '');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              per_page: 100
            });
            const previous = comments.find((comment) => comment.body?.includes(marker));

            if (previous) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: previous.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body
              });
            }

            if (success) {
              const { data: issue } = await github.rest.issues.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber
              });
              const completedBody = issue.body.replace(
                '- [ ] PR 병합 및 공개 도메인 배포 확인',
                '- [x] PR 병합 및 공개 도메인 배포 확인'
              );
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: completedBody,
                state: 'closed',
                state_reason: 'completed'
              });
            }
