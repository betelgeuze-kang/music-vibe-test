name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  pull_request:
    paths:
      - '**.html'
      - '**.md'
      - '**.yml'
      - '**.yaml'
      - '**.js'
      - '**.json'
      - '**.css'
      - 'assets/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Verify generated site
        run: |
          test -f _site/index.html
          test -f _site/p2-analytics.js
          test -f _site/ko/results/enfp/index.html
          grep -q 'p2-analytics.js' _site/index.html
          grep -q 'static_result_view' _site/p2-static.js

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    if: github.event_name == 'push'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
