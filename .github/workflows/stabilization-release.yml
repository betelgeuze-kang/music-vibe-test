name: Stabilization Release

on:
  pull_request:
    paths:
      - 'index.html'
      - 'build-info.json'
      - 'v2-*.css'
      - 'legal.css'
      - 'src/v2/**'
      - 'assets/audio/**'
      - 'about/**'
      - 'privacy/**'
      - 'audio-credits/**'
      - 'tests/e2e/**'
      - 'scripts/verify-release.mjs'
      - 'deploy-probe-sr1.txt'
      - '.github/workflows/stabilization-release.yml'
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  issues: write

concurrency:
  group: stabilization-release-${{ github.ref }}
  cancel-in-progress: false

env:
  PUBLIC_ORIGIN: https://my-music-vibe.com
  ORIGIN_HOST: my-music-vibe.com

jobs:
  artifact:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
      - name: Verify canonical CR1 Jekyll artifact
        run: |
          set -euo pipefail
          node scripts/verify-release.mjs --root _site
          grep -q 'Commercial Readiness CR1' _site/index.html
          grep -q 'v2-commercial-readiness.css' _site/v2-app.css
          grep -q 'createOriginalAudioUrl' _site/src/v2/audio/original-clips.mjs
          grep -q '현재 광고 비활성' _site/privacy/index.html
          grep -q 'MY_MUSIC_VIBE_STABILITY_SR1' _site/deploy-probe-sr1.txt
      - uses: actions/upload-artifact@v4
        with:
          name: canonical-cr1-artifact-${{ github.run_id }}
          path: |
            _site/build-info.json
            _site/assets/audio/rights-manifest.json
            _site/deploy-probe-sr1.txt
          retention-days: 14

  public-verification:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: artifact
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4

      - name: Request the active legacy Pages build
        id: legacy
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -uo pipefail
          set +e
          response="$(gh api -H 'Accept: application/vnd.github+json' -H 'X-GitHub-Api-Version: 2022-11-28' --method POST "repos/${GITHUB_REPOSITORY}/pages/builds" --include 2>&1)"
          code=$?
          set -e
          http="$(grep -m1 -E '^HTTP/' <<<"$response" | awk '{print $2}' || true)"
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          echo "http_code=$http" >> "$GITHUB_OUTPUT"

      - name: Optionally purge Cloudflare cache
        id: cloudflare
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${CF_API_TOKEN:-}" ] || [ -z "${CF_ZONE_ID:-}" ]; then
            echo "status=skipped_missing_secrets" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          response="$(curl -fsS --max-time 30 -X POST "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/purge_cache" -H "Authorization: Bearer ${CF_API_TOKEN}" -H 'Content-Type: application/json' --data '{"purge_everything":true}')"
          jq -e '.success == true' <<<"$response" >/dev/null
          echo "status=purged" >> "$GITHUB_OUTPUT"

      - name: Verify GitHub Pages origin and Cloudflare CR1 delivery
        id: verify
        shell: bash
        run: |
          set -uo pipefail
          ips=(185.199.108.153 185.199.109.153 185.199.110.153 185.199.111.153)
          headers=(-H 'Cache-Control: no-cache, no-store, must-revalidate' -H 'Pragma: no-cache' -A 'Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 Chrome/126 Safari/537.36')
          origin_transport='unavailable'

          fetch_origin() {
            local path="$1" ip body
            for ip in "${ips[@]}"; do
              body="$(curl --insecure --http1.1 -fsS --connect-timeout 8 --max-time 25 --retry 1 --resolve "${ORIGIN_HOST}:443:${ip}" "${headers[@]}" "https://${ORIGIN_HOST}${path}" 2>/dev/null || true)"
              if [ -n "$body" ]; then origin_transport="https-resolve-insecure:${ip}"; printf '%s' "$body"; return 0; fi
              body="$(curl --http1.1 -fsS --connect-timeout 8 --max-time 25 --retry 1 --resolve "${ORIGIN_HOST}:80:${ip}" "${headers[@]}" "http://${ORIGIN_HOST}${path}" 2>/dev/null || true)"
              if [ -n "$body" ]; then origin_transport="http-resolve:${ip}"; printf '%s' "$body"; return 0; fi
            done
            return 1
          }
          fetch_public() { curl -fsSL --connect-timeout 8 --max-time 25 --retry 1 "${headers[@]}" "${PUBLIC_ORIGIN}$1" 2>/dev/null || true; }

          verify_payloads() {
            local mode="$1" bust home build style entry audio questions manifest policy privacy credits probe result
            bust="cr1=${GITHUB_SHA}-$(date +%s)"
            local fetcher=fetch_public
            [ "$mode" = origin ] && fetcher=fetch_origin
            home="$($fetcher "/?${bust}")"
            build="$($fetcher "/build-info.json?${bust}")"
            style="$($fetcher "/v2-app.css?${bust}")"
            entry="$($fetcher "/src/v2/main.mjs?${bust}")"
            audio="$($fetcher "/src/v2/audio/original-clips.mjs?${bust}")"
            questions="$($fetcher "/src/v2/data/questions.mjs?${bust}")"
            manifest="$($fetcher "/assets/audio/rights-manifest.json?${bust}")"
            policy="$($fetcher "/src/v2/ads/policy.mjs?${bust}")"
            privacy="$($fetcher "/privacy/?${bust}")"
            credits="$($fetcher "/audio-credits/?${bust}")"
            probe="$($fetcher "/deploy-probe-sr1.txt?${bust}")"
            result="$($fetcher "/ko/results/enfp/?${bust}")"
            grep -q 'Commercial Readiness CR1' <<<"$home" \
              && grep -q 'data-ads-enabled="false"' <<<"$home" \
              && jq -e '.commercialReadinessRelease == "cr1" and .adsEnabled == false and .runtimeOverrides == false' <<<"$build" >/dev/null 2>&1 \
              && grep -q 'v2-commercial-readiness.css' <<<"$style" \
              && grep -q 'app.mjs?commercial=cr1' <<<"$entry" \
              && grep -q 'createOriginalAudioUrl' <<<"$audio" \
              && grep -q 'audioClipId' <<<"$questions" \
              && ! grep -q '\.mp3' <<<"$questions" \
              && jq -e '.release == "cr1" and .thirdPartySamplesUsed == false and (.clips | length) == 8' <<<"$manifest" >/dev/null 2>&1 \
              && grep -q 'ADS_ENABLED = false' <<<"$policy" \
              && grep -q '현재 광고 비활성' <<<"$privacy" \
              && grep -q '직접 합성' <<<"$credits" \
              && grep -q 'MY_MUSIC_VIBE_STABILITY_SR1' <<<"$probe" \
              && grep -q 'data-page-type="static_result"' <<<"$result"
          }

          origin_ok=false; public_ok=false; attempts=0
          for attempt in $(seq 1 24); do
            attempts=$attempt
            verify_payloads origin && origin_ok=true || origin_ok=false
            verify_payloads public && public_ok=true || public_ok=false
            echo "Attempt ${attempt}/24: origin=${origin_ok} (${origin_transport}), public=${public_ok}"
            if [ "$origin_ok" = true ] && [ "$public_ok" = true ]; then break; fi
            sleep 10
          done
          echo "origin_ok=$origin_ok" >> "$GITHUB_OUTPUT"
          echo "public_ok=$public_ok" >> "$GITHUB_OUTPUT"
          echo "attempts=$attempts" >> "$GITHUB_OUTPUT"
          echo "origin_transport=$origin_transport" >> "$GITHUB_OUTPUT"

      - name: Report CR1 deployment
        if: always()
        uses: actions/github-script@v7
        env:
          ORIGIN_OK: ${{ steps.verify.outputs.origin_ok }}
          PUBLIC_OK: ${{ steps.verify.outputs.public_ok }}
          ATTEMPTS: ${{ steps.verify.outputs.attempts }}
          ORIGIN_TRANSPORT: ${{ steps.verify.outputs.origin_transport }}
          LEGACY_HTTP: ${{ steps.legacy.outputs.http_code }}
          CF_STATUS: ${{ steps.cloudflare.outputs.status }}
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 28,
              body: `## CR1 origin + Cloudflare verification\n\n- commit: \`${context.sha}\`\n- GitHub Pages origin: **${process.env.ORIGIN_OK === 'true' ? 'PASS' : 'FAIL'}**\n- Cloudflare public: **${process.env.PUBLIC_OK === 'true' ? 'PASS' : 'FAIL'}**\n- origin transport: \`${process.env.ORIGIN_TRANSPORT || 'unavailable'}\`\n- attempts: \`${process.env.ATTEMPTS || '0'}\`\n- legacy build HTTP: \`${process.env.LEGACY_HTTP || '(none)'}\`\n- Cloudflare purge: \`${process.env.CF_STATUS || 'not-run'}\``
            });

      - name: Fail when the public CR1 release is stale
        if: always()
        run: |
          test "${{ steps.verify.outputs.origin_ok }}" = 'true'
          test "${{ steps.verify.outputs.public_ok }}" = 'true'
