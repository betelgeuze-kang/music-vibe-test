<body class="flex justify-center items-center min-h-screen p-0 sm:p-4">
    <div id="app-wrapper"
        class="w-full max-w-[420px] h-[100dvh] sm:h-[800px] bg-[#09090b] sm:rounded-3xl shadow-2xl overflow-hidden relative border border-gray-800 flex flex-col ring-1 ring-white/10">

        <div
            class="w-full px-6 py-5 flex justify-between items-center z-50 absolute top-0 left-0 right-0 bg-gradient-to-b from-black/80 to-transparent pointer-events-none">
            <span
                class="text-[10px] font-black italic text-transparent bg-clip-text bg-gradient-to-r from-amber-200 to-amber-500 tracking-[0.2em] pointer-events-auto cursor-pointer hover:opacity-80 transition-opacity drop-shadow-glow"
                onclick="resetTest()">
                MY VIBE
            </span>
        </div>

        <div class="absolute top-0 left-0 w-full h-full overflow-hidden pointer-events-none z-0">
            <div
                class="absolute top-[-20%] left-[-20%] w-[80%] h-[60%] bg-[#4c1d95] rounded-full blur-[120px] opacity-20 animate-pulse-slow">
            </div>
            <div
                class="absolute bottom-[-10%] right-[-10%] w-[60%] h-[50%] bg-[#0891b2] rounded-full blur-[100px] opacity-10 animate-float-slow"
                style="animation-delay: 2s;"></div>
            <div
                class="absolute top-[40%] left-[20%] w-[30%] h-[30%] bg-[#d97706] rounded-full blur-[100px] opacity-10 animate-pulse-slow"
                style="animation-delay: 1s;"></div>
        </div>

        <main id="app-container"
            class="flex-1 relative z-10 pt-14 pb-0 overflow-y-auto hide-scrollbar flex flex-col">
            <div class="flex flex-col items-center justify-center h-full text-white/50 animate-pulse">
                <p>Loading Experience...</p>
            </div>
        </main>

        <footer class="relative z-20 py-6 text-center border-t border-white/5 bg-black/40 backdrop-blur-md mt-auto">
            <div class="px-6">
                <p class="text-[10px] text-gray-500 mb-3 tracking-wider">
                    © <span id="copyright-year">2026</span> Music Vibe Test. All rights reserved.
                </p>
                <div class="flex justify-center flex-wrap gap-x-4 gap-y-2 text-[10px] text-gray-400 font-medium">
                    <button onclick="showLegal('privacy')"
                        class="hover:text-amber-400 transition-colors uppercase tracking-widest">Privacy Policy</button>
                    <span class="text-white/10">|</span>
                    <button onclick="showLegal('terms')"
                        class="hover:text-amber-400 transition-colors uppercase tracking-widest">Terms</button>
                    <span class="text-white/10">|</span>
                    <a href="https://github.com/betelgeuze-kang/music-vibe-test/issues/new" target="_blank"
                        rel="noopener noreferrer"
                        class="hover:text-amber-400 transition-colors uppercase tracking-widest">Contact</a>
                </div>
            </div>
        </footer>
    </div>

    <div id="legal-modal"
        class="fixed inset-0 z-[260] flex items-center justify-center bg-black/95 backdrop-blur-md opacity-0 pointer-events-none transition-all duration-500 p-4">
        <div
            class="relative w-full max-w-lg bg-[#0a0a0a] border border-white/10 rounded-2xl shadow-2xl p-8 overflow-hidden max-h-[80vh] flex flex-col scale-90 transition-transform">
            <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-purple-600 via-amber-400 to-purple-600">
            </div>
            <div id="legal-content" class="flex-1 overflow-y-auto pr-2 custom-scrollbar text-white"></div>
            <button onclick="closeLegal()"
                class="mt-8 w-full py-4 bg-white/5 hover:bg-white/10 border border-white/10 rounded-xl text-white font-bold transition-all uppercase tracking-widest text-xs">
                Close
            </button>
        </div>
    </div>

    <div id="global-visualizer"
        class="fixed bottom-0 left-0 right-0 h-[30vh] pointer-events-none z-0 opacity-0 transition-opacity duration-1000 flex items-end justify-center gap-1 pb-10">
    </div>

    <div id="sound-modal"
        class="fixed inset-0 z-50 flex items-center justify-center bg-black/90 backdrop-blur-sm opacity-0 pointer-events-none transition-all duration-500">
        <div class="relative w-full max-w-sm p-8 mx-4 bg-[#0a0a0a] border border-purple-500/30 rounded-2xl shadow-[0_0_50px_rgba(139,92,246,0.3)] transform scale-90 transition-all duration-500"
            id="sound-modal-content">
            <div class="text-center space-y-6">
                <div
                    class="inline-flex items-center justify-center w-20 h-20 bg-gradient-to-br from-purple-600 to-amber-500 rounded-full shadow-lg mb-2 animate-bounce">
                    <i data-lucide="headphones" class="w-10 h-10 text-white"></i>
                </div>
                <div class="space-y-3">
                    <h3 id="modal-title" class="text-2xl font-black text-white tracking-tight font-display">HEADPHONES ON?</h3>
                    <p id="modal-desc" class="text-gray-400 text-sm leading-relaxed">For the best experience, please use headphones.</p>
                </div>
                <button onclick="confirmSound()"
                    class="w-full py-4 bg-white hover:bg-gray-100 text-black font-black uppercase tracking-widest rounded-xl transition-all hover:scale-105 active:scale-95 shadow-[0_0_20px_rgba(255,255,255,0.2)]">
                    <span id="modal-btn">I'm Ready</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Hidden export card. No unsupported rarity or random metrics are displayed. -->
    <div id="export-card"
        class="fixed top-0 left-0 w-[1080px] h-[1920px] bg-black z-[-1] opacity-0 pointer-events-none flex flex-col items-center p-0 text-center text-white font-sans overflow-hidden transform translate-y-[200%]">
        <div id="export-bg-gradient"
            class="absolute inset-0 z-0 bg-gradient-to-br from-[#1b1b1f] via-[#242429] to-[#0a0a0c]"></div>
        <div id="export-bg-overlay"
            class="absolute inset-0 z-0 opacity-40 mix-blend-screen bg-[radial-gradient(circle_at_50%_50%,rgba(255,255,255,0.1)_0%,transparent_70%)]">
        </div>
        <div class="absolute inset-0 z-0 opacity-10">
            <div class="absolute top-0 left-[10%] w-px h-full bg-white/50"></div>
            <div class="absolute top-0 right-[10%] w-px h-full bg-white/50"></div>
            <div class="absolute top-[15%] left-0 w-full h-px bg-white/50"></div>
            <div class="absolute bottom-[10%] left-0 w-full h-px bg-white/50"></div>
        </div>

        <div class="relative z-10 w-full px-16 pt-24 flex justify-between items-end">
            <div class="flex flex-col items-start translate-x-2">
                <span class="text-4xl font-black italic tracking-[0.4em] text-white/40 uppercase mb-2">My Vibe ID</span>
                <span id="export-profile-id" class="text-3xl font-mono text-white/40">#MV-2026-VIBE</span>
            </div>
            <div class="flex flex-col items-end">
                <span class="text-lg font-black uppercase tracking-[0.5em] text-amber-500 mb-2">Result Card</span>
                <div class="px-10 py-4 bg-amber-500 text-black font-black text-4xl rounded-full shadow-[0_0_40px_rgba(245,158,11,0.3)]">
                    VIBE SIGNATURE
                </div>
            </div>
        </div>

        <div class="relative z-10 w-full flex-1 flex flex-col justify-center px-16">
            <div class="relative w-full aspect-[4/5] flex flex-col justify-start">
                <div class="relative z-30 flex flex-col items-start pt-10">
                    <h2 id="export-genre-en"
                        class="text-[120px] font-black leading-[0.85] text-white tracking-tighter uppercase text-left drop-shadow-[0_10px_30px_rgba(0,0,0,0.5)]">
                        MUSIC<br>VIBE
                    </h2>
                    <p id="export-genre-kr" class="text-6xl font-bold text-white/60 tracking-widest text-left"></p>
                </div>

                <div class="absolute bottom-[-100px] right-[-200px] w-[950px] h-[950px] z-20">
                    <div
                        class="absolute inset-0 bg-[#0f0f11] rounded-full shadow-[0_50px_120px_rgba(0,0,0,0.9)] border-[1px] border-white/10 flex items-center justify-center">
                        <div class="absolute inset-8 rounded-full border border-white/[0.05]"></div>
                        <div class="absolute inset-24 rounded-full border border-white/[0.05]"></div>
                        <div class="absolute inset-48 rounded-full border border-white/[0.05]"></div>
                        <div class="absolute inset-72 rounded-full border border-white/[0.05]"></div>
                        <div class="relative w-[520px] h-[520px] rounded-full overflow-hidden border-[12px] border-[#1a1a1e] shadow-inner">
                            <img id="export-img" src="assets/icon_main.webp" alt="Music vibe result" class="w-full h-full object-cover">
                            <div class="absolute inset-0 bg-gradient-to-b from-transparent to-black/20"></div>
                        </div>
                        <div
                            class="absolute w-16 h-16 bg-[#0f0f11] rounded-full border border-white/20 flex items-center justify-center z-30 shadow-lg">
                            <div class="w-3 h-3 bg-white/30 rounded-full"></div>
                        </div>
                    </div>
                </div>

                <div
                    class="relative z-30 w-[600px] bg-[#121214]/90 border border-white/10 rounded-[4rem] p-12 flex flex-col items-start shadow-2xl mr-auto mt-32">
                    <div id="export-tags" class="flex flex-wrap gap-3 mb-12"></div>
                    <div class="w-full">
                        <span class="text-2xl font-black uppercase tracking-widest text-white/40">Best Match</span>
                        <p id="export-match-type" class="mt-3 text-4xl font-black italic text-white leading-tight">MUSIC VIBE</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="relative z-10 w-full px-16 pb-48 flex justify-between items-center mt-auto">
            <div class="flex flex-col items-start text-left">
                <span class="text-5xl font-black italic tracking-tighter text-white">MY MUSIC VIBE</span>
                <span class="text-2xl font-mono text-white/40 tracking-widest mt-2 uppercase">my-music-vibe.com</span>
            </div>
            <div class="flex flex-col items-center gap-3">
                <div class="w-36 h-36 p-2 bg-white rounded-2xl shadow-2xl">
                    <img id="export-qr-image" src="assets/icon_main.webp" alt="QR code for this result" class="w-full h-full object-contain">
                </div>
                <span class="text-lg font-bold tracking-widest text-white/50 uppercase">Scan to compare</span>
            </div>
        </div>
    </div>

    <script src="lang.js"></script>
    <script src="questions.js"></script>
    <script src="quick-questions.js"></script>
    <script src="results.js"></script>
    <script src="playlists.js"></script>
    <script src="logic.js"></script>
    <script src="p0-fixes.js"></script>
    <script src="p1-experience.js"></script>
</body>
